     1) Kariyer sekmesi Topluluk'tan Yönetim'e taşındı

<!-- [A] NAV DEĞİŞİKLİĞİ
     1. ddTopluluk içindeki Kariyer nav item'ını kaldır.
     2. ddYonetim içine aşağıdaki item'ı ekle.
-->
<!--
<div class="nav-dd-item" onclick="showTabDD('kariyer','ddYonetim','navYonetimBtn')">
  <i class="ti ti-chart-radar"></i> Kariyer
</div>
-->

<script>
// ═══════════════════════════════════════════════════
// Q-PANEL v2.9.3 — Kariyer Auto Load Hotfix
// Sorun: Kariyer ekranı açılınca tablo "Yükleniyor..."da kalıyor,
// Yenile'ye basılınca veri geliyor.
// Çözüm: showTab/showTabDD sonrası aktif tab kariyer ise renderKariyer garanti çağrılır.
// ═══════════════════════════════════════════════════

(function qpanelKariyerAutoLoadHotfix(){
  if (window.__qpanelKariyerAutoLoadHotfixApplied) return;
  window.__qpanelKariyerAutoLoadHotfixApplied = true;

  function qkIsKariyerVisible() {
    var tab = document.getElementById('tab-kariyer');
    if (!tab) return false;
    var style = window.getComputedStyle ? window.getComputedStyle(tab) : null;
    var visibleByClass = tab.classList && tab.classList.contains('active');
    var visibleByStyle = !style || (style.display !== 'none' && style.visibility !== 'hidden');
    return visibleByClass || visibleByStyle;
  }

  function qkEnsureKariyerLoaded() {
    try {
      if (!qkIsKariyerVisible()) return;
      if (typeof renderKariyer === 'function') {
        // DOM/tab class güncellemesi bittikten sonra çalışsın
        setTimeout(function(){ renderKariyer(); }, 30);
      }
    } catch (e) {}
  }

  // showTab wrapper
  if (typeof window.showTab === 'function' && !window.showTab.__kariyerWrapped) {
    var _oldShowTab = window.showTab;
    window.showTab = function(tabName) {
      var ret = _oldShowTab.apply(this, arguments);
      if (tabName === 'kariyer') qkEnsureKariyerLoaded();
      return ret;
    };
    window.showTab.__kariyerWrapped = true;
  }

  // showTabDD wrapper
  if (typeof window.showTabDD === 'function' && !window.showTabDD.__kariyerWrapped) {
    var _oldShowTabDD = window.showTabDD;
    window.showTabDD = function(tabName) {
      var ret = _oldShowTabDD.apply(this, arguments);
      if (tabName === 'kariyer') qkEnsureKariyerLoaded();
      return ret;
    };
    window.showTabDD.__kariyerWrapped = true;
  }

  // _showTabContent içindeki fns objesine hâlâ kariyer eklenmediyse,
  // bu observer aktif tab değişimini yakalayıp yine render eder.
  try {
    var target = document.getElementById('tab-kariyer');
    if (target && typeof MutationObserver !== 'undefined') {
      var obs = new MutationObserver(function(){ qkEnsureKariyerLoaded(); });
      obs.observe(target, { attributes: true, attributeFilter: ['class', 'style'] });
    }
  } catch(e) {}

  // Eğer kullanıcı doğrudan kariyer sekmesinde reload ederse de dene
  setTimeout(qkEnsureKariyerLoaded, 250);
})();
</script>

<!-- [B] DAHA TEMİZ KALICI ÇÖZÜM
     index.html içinde _showTabContent fonksiyonundaki fns objesine şu satır mutlaka ekli olsun:

     kariyer: renderKariyer,

     Örnek:
     const fns = {
       dashboard: renderDashboard,
       members: renderMembers,
       org: renderOrg,
       ...
       kariyer: renderKariyer,
     };
-->

<!-- [C] DASHBOARD — SON SEZON PODYUMU KALDIRMA
     Dashboard HTML içinde "Son Sezon Podyumu" başlıklı kartı komple sil.
     Bulunacak metin örnekleri:
       - SON SEZON PODYUMU
       - sonSezon
       - Şampiyonlar Salonu →
       - season podium / sezon podium
     Aşağıdaki script, kalıntı kaldıysa runtime'da da gizler.
-->
<script>
(function qpanelRemoveSeasonPodiumHotfix(){
  if (window.__qpanelRemoveSeasonPodiumHotfixApplied) return;
  window.__qpanelRemoveSeasonPodiumHotfixApplied = true;

  function removeSeasonPodium() {
    try {
      var all = Array.from(document.querySelectorAll('section, div, article, .card, .panel, .q-card'));
      all.forEach(function(el){
        var txt = (el.innerText || '').toLowerCase();
        if (
          txt.includes('son sezon podyumu') ||
          txt.includes('şampiyonlar salonu') ||
          txt.includes('sampiyonlar salonu')
        ) {
          // En yakın kart/panel boyutundaki elementi kaldır
          var target = el;
          for (var i = 0; i < 4; i++) {
            if (!target.parentElement) break;
            var cls = String(target.className || '').toLowerCase();
            if (cls.includes('card') || cls.includes('panel') || cls.includes('section') || cls.includes('dashboard')) break;
            target = target.parentElement;
          }
          target.style.display = 'none';
          target.setAttribute('data-qpanel-removed', 'son-sezon-podyumu');
        }
      });
    } catch(e) {}
  }

  removeSeasonPodium();
  setInterval(removeSeasonPodium, 1500);
})();
</script>
