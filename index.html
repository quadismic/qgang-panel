<!-- ═══════════════════════════════════════════════════
     Q-PANEL v2.9.4 — Etkinlik Puan Onay Sistemi Patch
     Amaç:
     - Etkinlik önce oluşturulur.
     - Katılımcılar sonra kaydedilir.
     - Puan yalnızca "Puanları Onayla" ile işlenir.
     - Silmede -puan kaydı oluşturulmaz; ilgili +puan arşiv kayıtları kaldırılır.
     ═══════════════════════════════════════════════════ -->

<style>
.event-status-pill{display:inline-flex;align-items:center;gap:4px;border:.5px solid #333;border-radius:999px;padding:2px 7px;font-size:10px;color:#777;margin-left:6px}
.event-status-pill.ok{border-color:#14532d;color:#4ade80;background:#001a0f}
.event-status-pill.wait{border-color:#3a2800;color:#fbbf24;background:#1a1200}
.event-status-pill.draft{border-color:#333;color:#777;background:#111}
.event-actions-v294{display:flex;gap:6px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.event-actions-v294 .btn-xs{font-size:10px;padding:4px 7px;border-radius:8px}
</style>

<script>
// ═══════════════════════════════════════════════════
// Q-PANEL v2.9.4 — Event Workflow Frontend Helpers
// Bu patch mevcut etkinlik render fonksiyonuna entegre edilecek.
// Eğer renderEvents kartlarında aksiyon alanı varsa aşağıdaki helper'lar kullanılmalı.
// ═══════════════════════════════════════════════════

async function eventApi(action, payload) {
  try {
    var token = (typeof getToken === 'function') ? getToken() : '';
    var body = Object.assign({ action: action, token: token }, payload || {});
    var res = await secureApiFetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) return { success:false, error:'HTTP ' + res.status };
    return await res.json();
  } catch(e) {
    return { success:false, error:e.message };
  }
}

function eventStatusLabel(e) {
  if (e && e.puanOnaylandi === true) return '<span class="event-status-pill ok">✅ Puan Onaylandı</span>';
  if (e && (e.katilimcilar || e.katilimciSayisi)) return '<span class="event-status-pill wait">⏳ Puan Bekliyor</span>';
  return '<span class="event-status-pill draft">Taslak</span>';
}

async function eventParticipantsSave(eventId, katilimcilar) {
  var data = await eventApi('EVENT_PARTICIPANTS_SAVE', {
    item: { eventId: eventId, katilimcilar: katilimcilar }
  });
  if (data && data.success) {
    cmsStatusGoster('ok', '<i class="ti ti-check"></i> Katılımcılar kaydedildi. Puan onayı bekliyor.');
    try { await loadAll(); } catch(e) {}
    try { renderEvents(); } catch(e) {}
  } else {
    alert('Hata: ' + ((data && data.error) || 'Bilinmeyen'));
  }
}

async function eventApprovePoints(eventId) {
  if (!confirm('Bu etkinlikteki katılımcılara puan işlenecek. Onaylıyor musun?')) return;
  var data = await eventApi('EVENT_APPROVE_POINTS', { id: eventId });
  if (data && data.success) {
    var r = data.result || {};
    cmsStatusGoster('ok', '<i class="ti ti-check"></i> Etkinlik puanları onaylandı. İşlenen: ' + (r.awarded || 0));
    try { await loadAll(); } catch(e) {}
    try { renderEvents(); renderMembers(); } catch(e) {}
  } else {
    alert('Hata: ' + ((data && data.error) || 'Bilinmeyen'));
  }
}

async function eventResetPoints(eventId) {
  if (!confirm('Bu etkinliğe ait puan arşiv kayıtları kaldırılacak ve üye puanları dengelenecek. Devam edilsin mi?')) return;
  var data = await eventApi('EVENT_POINTS_RESET', { id: eventId });
  if (data && data.success) {
    var r = data.result || {};
    cmsStatusGoster('ok', '<i class="ti ti-check"></i> Etkinlik puanları sıfırlandı. Silinen arşiv: ' + (r.removed || 0));
    try { await loadAll(); } catch(e) {}
    try { renderEvents(); renderMembers(); } catch(e) {}
  } else {
    alert('Hata: ' + ((data && data.error) || 'Bilinmeyen'));
  }
}

// Mevcut deleteEvent / EVENT_DELETE çağrısı kalabilir.
// Backend artık negatif kayıt atmaz, eventId'ye bağlı +puan kayıtlarını kaldırır.
// Bu yüzden frontend silme butonunun action'ı değişmek zorunda değil.

// Render entegrasyon önerisi:
// Etkinlik kartında başlık yanına:
//   ${eventStatusLabel(e)}
//
// Aksiyon alanına:
//   e.puanOnaylandi
//     ? `<button onclick="eventResetPoints('${e._id}')">Puanı Sıfırla</button>`
//     : `<button onclick="eventApprovePoints('${e._id}')">Puanları Onayla</button>`
//
// Katılımcı düzenleme kaydında EVENT_UPDATE yerine mümkünse:
//   eventParticipantsSave(e._id, katilimcilar)
</script>
