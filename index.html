<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q-GANG Test</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#d3d1c7;padding:20px}
.box{background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin-bottom:12px}
.ok{color:#9fe1cb}.err{color:#e24b4a}.warn{color:#fac775}
pre{font-size:11px;white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto}
</style>
</head>
<body>
<h2>Q-GANG Bağlantı Testi</h2>

<div class="box">
  <div id="status">⏳ Wix'ten mesaj bekleniyor...</div>
</div>

<div class="box">
  <div><strong>Mesaj geçmişi:</strong></div>
  <pre id="log">—</pre>
</div>

<script>
const log = document.getElementById('log');
const status = document.getElementById('status');
let msgs = [];

window.addEventListener('message', function(event) {
  const data = event.data;
  msgs.unshift(JSON.stringify(data, null, 2).substring(0, 300));
  log.textContent = msgs.slice(0,5).join('\n---\n');

  if (data && data.type === 'QGANG_AUTH') {
    const memberCount = data.cmsData?.members?.length || 0;
    const eventCount = data.cmsData?.events?.length || 0;
    const budgetCount = data.cmsData?.budget?.length || 0;
    status.innerHTML = `
      <span class="ok">✅ Wix bağlantısı ÇALIŞIYOR</span><br><br>
      👤 Rumuz: <strong>${data.rumuz}</strong><br>
      🎖️ Rol: <strong>${data.rol}</strong><br>
      👥 Üye sayısı: <strong>${memberCount}</strong><br>
      📅 Etkinlik sayısı: <strong>${eventCount}</strong><br>
      💰 Bütçe kaydı: <strong>${budgetCount}</strong>
    `;
  }
});

window.addEventListener('load', function() {
  if (window.parent !== window) {
    window.parent.postMessage({type: 'QGANG_READY'}, '*');
    status.innerHTML = '⏳ QGANG_READY gönderildi, cevap bekleniyor...';
  } else {
    status.innerHTML = '<span class="warn">⚠️ Bu sayfa doğrudan açıldı. Wix iframe içinde açılmalı.</span>';
  }

  // 2 saniye sonra da gönder
  setTimeout(() => {
    if (window.parent !== window) {
      window.parent.postMessage({type: 'QGANG_READY'}, '*');
    }
  }, 2000);
});
</script>
</body>
</html>
