<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q-GANG Panel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#111;color:#d3d1c7;padding:12px}
.panel{max-width:900px;margin:0 auto}

/* GİRİŞ EKRANI */
#loginScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:#111;display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:1rem}
#loginScreen .logo{font-size:28px;font-weight:700;color:#d3d1c7;letter-spacing:2px;margin-bottom:.5rem}
#loginScreen .sub{font-size:13px;color:#555;margin-bottom:1.5rem}
#loginScreen .spinner{width:32px;height:32px;border:2px solid #333;border-top-color:#fac775;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.login-box{background:#1a1a1a;border:0.5px solid #333;border-radius:12px;padding:1.5rem;width:100%;max-width:360px}
.login-box h2{font-size:16px;font-weight:500;margin-bottom:1rem;color:#d3d1c7}
.login-form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.login-form-group label{font-size:11px;color:#888}
.login-form-group input{padding:8px 10px;border-radius:8px;border:0.5px solid #444;background:#111;color:#d3d1c7;font-size:13px}
.login-error{font-size:12px;color:#e24b4a;margin-bottom:8px;display:none}
.login-lockout{font-size:12px;color:#e24b4a;padding:8px;background:#3a1010;border-radius:6px;margin-bottom:8px;display:none}
.rol-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

/* ROL RENKLERİ */
.rol-lider{background:#2c2c2a;color:#d3d1c7}
.rol-yonetici{background:#3a1010;color:#e24b4a}
.rol-yetkili{background:#042c53;color:#b5d4f4}
.rol-yardimci{background:#04342c;color:#9fe1cb}
.rol-uye{background:#412402;color:#fac775}

.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.2rem;border-bottom:0.5px solid #333;padding-bottom:.8rem}
.nav button{padding:6px 12px;border-radius:8px;border:0.5px solid #444;background:transparent;color:#888;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.nav button.active{background:#1e1e1e;color:#d3d1c7;border-color:#666}
.nav button:hover{background:#1a1a1a}
.nav button:disabled{opacity:.3;cursor:not-allowed}
.tab{display:none}.tab.active{display:block}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:1.2rem}
.stat-card{background:#1a1a1a;border-radius:8px;padding:12px}
.stat-card .label{font-size:11px;color:#888;margin-bottom:4px}
.stat-card .value{font-size:20px;font-weight:500;color:#d3d1c7}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
th{text-align:left;padding:7px 8px;color:#888;border-bottom:0.5px solid #333;font-weight:500;font-size:11px;white-space:nowrap}
td{padding:7px 8px;border-bottom:0.5px solid #222;color:#d3d1c7;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover td{background:#1a1a1a}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500;white-space:nowrap}
.badge-siyah{background:#2c2c2a;color:#d3d1c7}
.badge-kirmizi{background:#3a1010;color:#e24b4a}
.badge-mavi{background:#042c53;color:#b5d4f4}
.badge-yesil{background:#04342c;color:#9fe1cb}
.badge-sari{background:#412402;color:#fac775}
.badge-beyaz{background:#2a2a28;color:#888780}
.badge-aktif{background:#04342c;color:#9fe1cb}
.badge-pasif{background:#2a2a28;color:#888780}
.badge-riskli{background:#3a1010;color:#e24b4a}
.badge-izinde{background:#042c53;color:#b5d4f4}
.badge-arsiv{background:#1a1a1a;color:#555}
.badge-gelir{background:#04342c;color:#9fe1cb}
.badge-gider{background:#3a1010;color:#e24b4a}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:8px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:11px;color:#888}
.form-group input,.form-group select,.form-group textarea{padding:7px 9px;border-radius:8px;border:0.5px solid #444;background:#1a1a1a;color:#d3d1c7;font-size:13px;width:100%}
.form-group textarea{resize:vertical;min-height:56px}
.btn{padding:7px 14px;border-radius:8px;border:0.5px solid #444;background:transparent;color:#d3d1c7;font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:hover{background:#1e1e1e}
.btn-primary{background:#042c53;color:#b5d4f4;border-color:#185fa5}
.btn-danger{background:#3a1010;color:#e24b4a;border-color:#a32d2d}
.btn-success{background:#04342c;color:#9fe1cb;border-color:#0f6e56}
.btn-warn{background:#412402;color:#fac775;border-color:#854f0b}
.btn-sm{padding:3px 8px;font-size:11px}
.section-title{font-size:14px;font-weight:500;color:#d3d1c7;margin-bottom:.8rem}
.card{background:#1a1a1a;border:0.5px solid #333;border-radius:10px;padding:.9rem 1rem;margin-bottom:.8rem}
.puan-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.puan-bar-bg{flex:1;height:5px;background:#2a2a2a;border-radius:3px;overflow:hidden;min-width:40px}
.puan-bar{height:100%;background:#1d9e75;border-radius:3px;transition:width .3s}
.alert-row{display:flex;align-items:flex-start;gap:8px;padding:7px 9px;border-radius:8px;margin-bottom:5px;font-size:12px;line-height:1.4}
.alert-warn{background:#412402;color:#fac775}
.alert-info{background:#042c53;color:#b5d4f4}
.alert-danger{background:#3a1010;color:#e24b4a}
.alert-success{background:#04342c;color:#9fe1cb}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.8rem;align-items:center}
.filters select,.filters input{padding:5px 8px;border-radius:8px;border:0.5px solid #444;background:#1a1a1a;color:#d3d1c7;font-size:12px}
.member-chips{display:flex;flex-wrap:wrap;gap:3px}
.chip{padding:2px 7px;border-radius:10px;font-size:10px;background:#222;color:#888;border:0.5px solid #333}
.event-card{background:#1a1a1a;border:0.5px solid #333;border-radius:10px;padding:.9rem;margin-bottom:8px}
.event-card .ev-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.event-card .ev-title{font-weight:500;font-size:13px}
.event-card .ev-meta{font-size:11px;color:#888;margin-bottom:6px}
.butce-ozet{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem}
.butce-kart{border-radius:8px;padding:12px}
.butce-kart .label{font-size:11px;margin-bottom:4px}
.butce-kart .value{font-size:18px;font-weight:500}
.bk-gelir{background:#04342c}.bk-gelir .label{color:#1d9e75}.bk-gelir .value{color:#9fe1cb}
.bk-gider{background:#3a1010}.bk-gider .label{color:#a32d2d}.bk-gider .value{color:#e24b4a}
.bk-net{background:#1a1a1a;border:0.5px solid #333}.bk-net .label{color:#888}.bk-net .value{color:#d3d1c7}
.import-area{border:0.5px dashed #444;border-radius:8px;padding:1rem;text-align:center;cursor:pointer;color:#888;font-size:12px}
.import-area:hover{border-color:#666;color:#d3d1c7}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;z-index:1000;padding:12px}
.modal-box{background:#1a1a1a;border-radius:12px;border:0.5px solid #444;padding:1.25rem;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-box h3{font-size:15px;font-weight:500;margin-bottom:.9rem;color:#d3d1c7}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:.9rem;flex-wrap:wrap}
.confirm-box{background:#1a1a1a;border-radius:12px;border:0.5px solid #854f0b;padding:1.25rem;width:100%;max-width:400px}
.confirm-box h3{font-size:14px;font-weight:500;margin-bottom:.6rem;color:#fac775}
.confirm-box p{font-size:13px;color:#d3d1c7;line-height:1.5;margin-bottom:1rem}
.kod-box{background:#1a1a1a;border-radius:12px;border:0.5px solid #185fa5;padding:1.25rem;width:100%;max-width:680px;max-height:90vh;overflow-y:auto}
.kod-box h3{font-size:14px;font-weight:500;margin-bottom:.6rem;color:#b5d4f4}
.kod-area{background:#0a0a0a;border:0.5px solid #333;border-radius:8px;padding:.8rem;font-family:monospace;font-size:11px;color:#9fe1cb;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;margin-bottom:.8rem;line-height:1.5}
.log-item{padding:8px 10px;border-bottom:0.5px solid #222;font-size:11px;line-height:1.5}
.log-item:last-child{border-bottom:none}
.log-time{color:#555;font-size:10px;margin-bottom:2px}
.log-who{color:#fac775;font-size:10px;font-weight:600}
.log-action{color:#d3d1c7}
.log-detail{color:#888;font-size:10px}
/* ORG */
.org-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:.5rem 0;text-align:center}
svg.org{display:inline-block}
@keyframes orgFadeIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
.org-node-anim{opacity:0;animation:orgFadeIn .4s ease forwards}
.org-lider rect{fill:#2c2c2a;stroke:#888780;stroke-width:0.5}
.org-lider text.t1{fill:#d3d1c7;font-size:12px;font-weight:600}
.org-lider text.t2{fill:#888780;font-size:10px}
.org-yonetici rect{fill:none;stroke:#a32d2d;stroke-width:0.5;stroke-dasharray:5 3}
.org-yonetici text{fill:#e24b4a;font-size:10px;opacity:.7}
.org-yetkili rect{fill:#042c53;stroke:#185fa5;stroke-width:0.5}
.org-yetkili text.t1{fill:#b5d4f4;font-size:12px;font-weight:600}
.org-yetkili text.t2{fill:#378add;font-size:10px}
.org-yardimci rect{fill:#04342c;stroke:#0f6e56;stroke-width:0.5}
.org-yardimci text.t1{fill:#9fe1cb;font-size:12px;font-weight:600}
.org-yardimci text.t2{fill:#1d9e75;font-size:10px}
.org-uye rect{fill:#412402;stroke:#854f0b;stroke-width:0.5}
.org-uye text.t1{fill:#fac775;font-size:10px;font-weight:600}
.org-uye text.t2{fill:#ba7517;font-size:9px}
.org-conn{stroke:#444;stroke-width:0.5;fill:none;opacity:0;animation:orgFadeIn .3s ease forwards}
.org-conn-dash{stroke:#444;stroke-width:0.5;fill:none;stroke-dasharray:4 3;opacity:0;animation:orgFadeIn .3s ease forwards}
.sep{border:none;border-top:0.5px solid #333;margin:.9rem 0}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.9rem;gap:8px;flex-wrap:wrap}
.top-bar h1{font-size:17px;font-weight:500;color:#d3d1c7}
.top-bar .sub{font-size:11px;color:#555;margin-top:2px}
.user-info{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
/* ERİŞİM ENGELİ */
.erisim-engel{background:#1a1a1a;border:0.5px solid #3a1010;border-radius:10px;padding:2rem;text-align:center;color:#e24b4a;font-size:13px;margin:1rem 0}
.erisim-engel i{font-size:28px;display:block;margin-bottom:.5rem;opacity:.6}
@media(max-width:600px){
  body{padding:8px}
  .dash-grid{grid-template-columns:1fr}
  .butce-ozet{grid-template-columns:1fr 1fr}
  .butce-kart.bk-net{grid-column:1/-1}
  .form-row{grid-template-columns:1fr}
  .filters{flex-direction:column;align-items:stretch}
  .filters select,.filters input{width:100%}
  .modal-box,.confirm-box,.kod-box{padding:1rem}
  .nav button{font-size:11px;padding:5px 9px}
  table{font-size:11px}th,td{padding:5px 6px}
}
</style>
</head>
<body>

<!-- GİRİŞ BEKLENİYOR EKRANI -->
<div id="loginScreen">
  <div class="logo">Q-GANG</div>
  <div class="sub">Kimlik doğrulanıyor...</div>
  <div class="spinner"></div>
</div>

<!-- ANA PANEL (giriş sonrası görünür) -->
<div class="panel" id="mainPanel" style="display:none">

<div class="top-bar">
  <div>
    <h1>Q-GANG Paneli</h1>
    <div class="sub" id="lastSaved">Hazır</div>
  </div>
  <div class="user-info">
    <span id="userRolBadge"></span>
    <span id="userRumuz" style="font-size:13px;color:#888"></span>
    <button class="btn btn-primary" onclick="reqAddMember()" id="btnUyeEkle" style="display:none"><i class="ti ti-plus"></i> Üye Ekle</button>
  </div>
</div>

<nav class="nav" id="mainNav">
  <button class="active" onclick="showTab('dashboard',this)"><i class="ti ti-chart-bar"></i> Dashboard</button>
  <button onclick="showTab('members',this)" id="navMembers"><i class="ti ti-users"></i> Üyeler</button>
  <button onclick="showTab('puan',this)" id="navPuan"><i class="ti ti-star"></i> Puan</button>
  <button onclick="showTab('gorev',this)" id="navGorev"><i class="ti ti-check"></i> Görevler</button>
  <button onclick="showTab('etkinlik',this)" id="navEtkinlik"><i class="ti ti-calendar"></i> Etkinlikler</button>
  <button onclick="showTab('butce',this)" id="navButce"><i class="ti ti-currency-lira"></i> Bütçe</button>
  <button onclick="showTab('org',this)"><i class="ti ti-hierarchy"></i> Organizasyon</button>
  <button onclick="showTab('log',this)" id="navLog"><i class="ti ti-history"></i> Log</button>
</nav>

<!-- DASHBOARD -->
<div id="tab-dashboard" class="tab active">
  <div class="stat-grid" id="statsGrid"></div>
  <div class="dash-grid">
    <div><div class="section-title">Uyarılar</div><div id="alertsBox"></div></div>
    <div><div class="section-title">Yaklaşan etkinlikler</div><div id="upcomingEvents"></div></div>
  </div>
  <div class="dash-grid" style="margin-top:1rem">
    <div><div class="section-title">Yaklaşan doğum günleri</div><div id="birthdaysBox"></div></div>
    <div><div class="section-title">Kasa özeti</div><div id="dashButce"></div></div>
  </div>
  <hr class="sep">
  <div class="section-title">Rütbe dağılımı</div>
  <div id="rutbeChart"></div>
</div>

<!-- ÜYELER -->
<div id="tab-members" class="tab">
  <div class="filters">
    <input type="text" id="searchBox" placeholder="Ara..." oninput="renderMembers()" style="max-width:150px">
    <select id="filterRutbe" onchange="renderMembers()">
      <option value="">Tüm rütbeler</option>
      <option>Siyah</option><option>Kırmızı</option><option>Mavi</option>
      <option>Yeşil</option><option>Sarı</option><option>Beyaz</option>
    </select>
    <select id="filterDurum" onchange="renderMembers()">
      <option value="">Tüm durumlar</option>
      <option>Aktif</option><option>Pasif</option><option>Riskli</option>
      <option>İzinde</option><option>Arşiv</option>
    </select>
    <select id="filterGorev" onchange="renderMembers()">
      <option value="">Tüm görevler</option>
      <option>Klan</option><option>Sosyal Medya</option><option>Yönetim</option><option>Özel</option><option>Yok</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th style="width:26px">#</th><th style="width:100px">Rumuz</th><th style="width:72px">Rütbe</th>
        <th style="width:64px">Durum</th><th style="width:80px">Görev</th><th style="width:44px">Puan</th>
        <th style="width:80px">Katılım</th><th style="width:70px">İşlem</th>
      </tr></thead>
      <tbody id="memberTableBody"></tbody>
    </table>
  </div>
</div>

<!-- PUAN -->
<div id="tab-puan" class="tab">
  <div class="section-title">Puan tablosu</div>
  <div id="puanList"></div>
  <div id="puanEditor"></div>
</div>

<!-- GÖREVLER -->
<div id="tab-gorev" class="tab">
  <div id="gorevEditor"></div>
  <div class="section-title">Görev dağılımı</div>
  <div id="gorevList"></div>
</div>

<!-- ETKİNLİKLER -->
<div id="tab-etkinlik" class="tab">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:8px">
    <div class="section-title" style="margin:0">Etkinlikler</div>
    <button class="btn btn-primary" onclick="openModal('addEvent')" id="btnEtkinlikEkle" style="display:none"><i class="ti ti-plus"></i> Yeni Etkinlik</button>
  </div>
  <div id="eventList"></div>
</div>

<!-- BÜTÇE -->
<div id="tab-butce" class="tab">
  <div id="butceContent"></div>
</div>

<!-- ORGANİZASYON -->
<div id="tab-org" class="tab">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:8px">
    <div class="section-title" style="margin:0">Organizasyon şeması</div>
    <button class="btn btn-primary" onclick="orgKodUret()" id="btnKodUret" style="display:none"><i class="ti ti-code"></i> Kod Üret</button>
  </div>
  <div class="org-wrap" id="orgWrap"></div>
</div>

<!-- LOG -->
<div id="tab-log" class="tab">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;flex-wrap:wrap;gap:8px">
    <div class="section-title" style="margin:0">Değişiklik geçmişi</div>
    <button class="btn btn-danger btn-sm" onclick="clearLog()" id="btnLogTemizle" style="display:none"><i class="ti ti-trash"></i> Logu temizle</button>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <div id="logList" style="max-height:600px;overflow-y:auto"></div>
  </div>
</div>

</div><!-- /mainPanel -->
<div id="modalContainer"></div>

<script>
// ══════════════════════════════════════════
// ROL TANIMI VE İZİN MATRİSİ
// ══════════════════════════════════════════
const ROL_SIRASI = ['Lider','Yönetici','Yetkili','Yardımcı','Üye'];

const IZINLER = {
  Lider:    {dashboard:1,uyeGor:1,uyeEkle:1,uyeSil:1,uyeDuzenle:1,rutbeDegistir:1,puanGor:1,puanDuzenle:1,gorevAta:1,etkinlikGor:1,etkinlikEkle:1,etkinlikSil:1,butceGor:1,butceDuzenle:1,logGor:1,logSil:1,kodUret:1,orgGor:1},
  Yönetici: {dashboard:1,uyeGor:1,uyeEkle:1,uyeSil:0,uyeDuzenle:1,rutbeDegistir:1,puanGor:1,puanDuzenle:1,gorevAta:1,etkinlikGor:1,etkinlikEkle:1,etkinlikSil:1,butceGor:1,butceDuzenle:0,logGor:1,logSil:0,kodUret:0,orgGor:1},
  Yetkili:  {dashboard:1,uyeGor:1,uyeEkle:0,uyeSil:0,uyeDuzenle:1,rutbeDegistir:0,puanGor:1,puanDuzenle:1,gorevAta:1,etkinlikGor:1,etkinlikEkle:1,etkinlikSil:0,butceGor:0,butceDuzenle:0,logGor:0,logSil:0,kodUret:0,orgGor:1},
  Yardımcı: {dashboard:1,uyeGor:1,uyeEkle:0,uyeSil:0,uyeDuzenle:0,rutbeDegistir:0,puanGor:1,puanDuzenle:0,gorevAta:0,etkinlikGor:1,etkinlikEkle:1,etkinlikSil:0,butceGor:0,butceDuzenle:0,logGor:0,logSil:0,kodUret:0,orgGor:1},
  Üye:      {dashboard:1,uyeGor:1,uyeEkle:0,uyeSil:0,uyeDuzenle:0,rutbeDegistir:0,puanGor:1,puanDuzenle:0,gorevAta:0,etkinlikGor:1,etkinlikEkle:0,etkinlikSil:0,butceGor:0,butceDuzenle:0,logGor:0,logSil:0,kodUret:0,orgGor:1}
};

// Oturum bilgisi
let SESSION = {rumuz:'', rol:'Üye', girisZamani: null};

function izin(key){return !!(IZINLER[SESSION.rol]||IZINLER['Üye'])[key]}

// ══════════════════════════════════════════
// CMS KÖPRÜSÜ — HTTP API ile haberleşme
// ══════════════════════════════════════════

// Wix HTTP Functions endpoint
const API_URL = 'https://www.q-gang.com/_functions/qgang';

// CMS'den veri oku
async function cmsOku(){
  try {
    const res = await fetch(API_URL, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });
    if(!res.ok) throw new Error('API yanıt vermedi: ' + res.status);
    return await res.json();
  } catch(e) {
    console.error('CMS okuma hatası:', e);
    return null;
  }
}

// CMS'e yaz
async function cmsYaz(action, data){
  try {
    const payload = action.includes('DELETE')
      ? { action, id: data }
      : { action, item: data };

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('API yazma hatası: ' + res.status);
    const result = await res.json();
    document.getElementById('lastSaved').textContent = 'Son kayıt: ' + new Date().toLocaleTimeString('tr-TR');

    // Local array'e yansıt
    if(result.result){
      const item = result.result;
      if(action==='MEMBER_ADD') members.push({...item, id: item._id||item.id});
      if(action==='MEMBER_UPDATE'){
        const i=members.findIndex(m=>m._id===item._id||m.id===item.id);
        if(i>-1) members[i]={...members[i],...item,id:item._id||item.id};
      }
      if(action==='EVENT_ADD') events.push({...item, id: item._id||item.id, katilimcilar: typeof item.katilimcilar==='string'?item.katilimcilar.split(',').map(s=>s.trim()):(item.katilimcilar||[])});
      if(action==='BUDGET_ADD') butce.push({...item, id: item._id||item.id});
    }
    return result;
  } catch(e) {
    console.error('CMS yazma hatası:', e);
  }
}

function girisYap(rumuz, rol){
  if(SESSION.girisZamani) return; // Zaten giriş yapılmış
  SESSION.rumuz = rumuz;
  SESSION.rol = ROL_SIRASI.includes(rol) ? rol : 'Üye';
  SESSION.girisZamani = new Date().toISOString();

  // Login ekranını gizle, paneli göster
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainPanel').style.display = 'block';

  // Kullanıcı bilgisini göster
  const rolClass = {Lider:'lider',Yönetici:'yonetici',Yetkili:'yetkili',Yardımcı:'yardimci',Üye:'uye'};
  document.getElementById('userRolBadge').innerHTML = `<span class="rol-badge rol-${rolClass[SESSION.rol]||'uye'}">${SESSION.rol}</span>`;
  document.getElementById('userRumuz').textContent = SESSION.rumuz;

  // İzinlere göre UI'ı ayarla
  uiAyarla();

  // Log kaydı
  addLog('Giriş', `${SESSION.rumuz} — ${SESSION.rol} olarak giriş yaptı`);
  save();

  // Dashboard'u render et
  renderDashboard();
}

function fmtTL(v){return Number(v).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺'}
function fmtDate(s){if(!s)return'-';const[y,mo,d]=s.split('-');return`${d}.${mo}.${y}`}

function daysUntil(s){if(!s)return null;const n=new Date();n.setHours(0,0,0,0);const d=new Date(s);d.setHours(0,0,0,0);return Math.ceil((d-n)/(864e5))}

/* ── ORG ŞEMA ── */
function buildOrgSVG(animated){
  const W=700,NW=108,NH=40,NY=34,UW=88,UH=36,GAP=10;
  const lider=members.find(m=>m.rutbe==='Siyah');
  const yoneticiler=members.filter(m=>m.rutbe==='Kırmızı');
  const yetkililer=members.filter(m=>m.rutbe==='Mavi');
  const yardimcilar=members.filter(m=>m.rutbe==='Yeşil');
  const uyeler=members.filter(m=>m.rutbe==='Sarı'||m.rutbe==='Beyaz');
  const UCOLS=Math.min(uyeler.length,6);
  const uRows=uyeler.length?Math.ceil(uyeler.length/UCOLS):0;
  let svgH=20;
  const LY=svgH;svgH+=NH+30;const YOY=svgH;svgH+=NY+30;const YEY=svgH;svgH+=NH+30;
  const YAY=svgH;svgH+=yardimcilar.length?NH+30:0;const UY=svgH;
  if(uyeler.length)svgH+=uRows*(UH+6)+20;
  const cx=W/2;let animDelay=0;
  function rowStartX(count,itemW){return(W-(count*itemW+(count-1)*GAP))/2}
  function nodeG(cls,x,y,w,h,t1,t2,delay){
    const anim=animated?`class="org-node-anim" style="animation-delay:${delay}ms"`:'';
    return`<g ${anim}><g class="org-node ${cls}"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="6"/><text class="t1" x="${x+w/2}" y="${y+h/2-7}" text-anchor="middle" dominant-baseline="central">${t1}</text><text class="t2" x="${x+w/2}" y="${y+h/2+7}" text-anchor="middle" dominant-baseline="central">${t2}</text></g></g>`
  }
  function ln(x1,y1,x2,y2,dash,delay){
    const anim=animated?`style="animation-delay:${delay}ms"`:'';
    return`<line class="${dash?'org-conn-dash':'org-conn'}" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" ${anim}/>`
  }
  let svg=`<svg class="org" viewBox="0 0 ${W} ${svgH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:${W}px;height:auto">`;
  if(lider){svg+=nodeG('org-lider',cx-NW/2,LY,NW,NH,lider.rumuz,'Lider',animDelay);svg+=ln(cx,LY+NH,cx,YOY,true,animDelay+50);animDelay+=100}
  if(yoneticiler.length){const sx=rowStartX(yoneticiler.length,NW);if(yoneticiler.length>1)svg+=ln(sx+NW/2,YOY+NY/2,sx+(yoneticiler.length-1)*(NW+GAP)+NW/2,YOY+NY/2,false,animDelay);yoneticiler.forEach((m,i)=>{const nx=sx+i*(NW+GAP);svg+=ln(cx,YOY,nx+NW/2,YOY,false,animDelay);svg+=nodeG('org-yonetici',nx,YOY,NW,NY,m.rumuz,'Yönetici',animDelay+50);animDelay+=80})}
  else{const bw=260,bx=cx-bw/2;const anim=animated?`class="org-node-anim" style="animation-delay:${animDelay}ms"`:'';svg+=`<g ${anim}><g class="org-node org-yonetici"><rect x="${bx}" y="${YOY}" width="${bw}" height="${NY}" rx="6"/><text class="org-yonetici" x="${cx}" y="${YOY+NY/2}" text-anchor="middle" dominant-baseline="central">Yönetici kademe — henüz boş</text></g></g>`;animDelay+=100}
  if(yetkililer.length){const sx=rowStartX(yetkililer.length,NW);if(yetkililer.length>1)svg+=ln(sx+NW/2,YEY+NH/2,sx+(yetkililer.length-1)*(NW+GAP)+NW/2,YEY+NH/2,false,animDelay);yetkililer.forEach((m,i)=>{const nx=sx+i*(NW+GAP),ncx=nx+NW/2;svg+=ln(cx,YOY+NY,ncx,YEY,false,animDelay);svg+=nodeG('org-yetkili',nx,YEY,NW,NH,m.rumuz,'Yetkili',animDelay+50);if(yardimcilar.length)svg+=ln(ncx,YEY+NH,ncx,YAY,false,animDelay+100);animDelay+=80})}
  if(yardimcilar.length){const sx=rowStartX(yardimcilar.length,NW);if(yardimcilar.length>1)svg+=ln(sx+NW/2,YAY+NH/2,sx+(yardimcilar.length-1)*(NW+GAP)+NW/2,YAY+NH/2,false,animDelay);yardimcilar.forEach((m,i)=>{const nx=sx+i*(NW+GAP);svg+=nodeG('org-yardimci',nx,YAY,NW,NH,m.rumuz,'Yardımcı',animDelay+50);animDelay+=80})}
  if(uyeler.length){for(let row=0;row<uRows;row++){const rowItems=uyeler.slice(row*UCOLS,(row+1)*UCOLS);const sx=rowStartX(rowItems.length,UW);const ny=UY+row*(UH+6);if(row===0&&!yardimcilar.length&&!yetkililer.length)svg+=ln(sx+UW/2,UY,sx+(rowItems.length-1)*(UW+GAP)+UW/2,UY,false,animDelay);rowItems.forEach((m,i)=>{const nx=sx+i*(UW+GAP),ncx=nx+UW/2;if(row===0)svg+=ln(ncx,UY,ncx,UY+UH,false,animDelay);svg+=nodeG('org-uye',nx,ny,UW,UH,m.rumuz,'Üye',animDelay+50);animDelay+=40})}}
  svg+='</svg>';return svg;
}

function renderOrg(){document.getElementById('orgWrap').innerHTML=buildOrgSVG(true)}

.org-lider rect{fill:#2c2c2a;stroke:#888780;stroke-width:0.5}.org-lider text.t1{fill:#d3d1c7;font-size:12px;font-weight:600;font-family:Arial,sans-serif}.org-lider text.t2{fill:#888780;font-size:10px;font-family:Arial,sans-serif}

    <div class="kod-area">${fullCode.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap">
      <button class="btn" onclick="closeModal()">Kapat</button>
      <button class="btn btn-primary" onclick="copyOrgKod()"><i class="ti ti-copy"></i> Kopyala</button>
    </div>
    <div id="copyMsg" style="font-size:11px;color:#9fe1cb;text-align:right;margin-top:4px;display:none">Kopyalandı!</div>
    </div></div>`;
  window._orgKodFull=fullCode;
}

function reqAddMember(){if(izin('uyeEkle'))openModal('addMember')}
function reqDeleteMember(id){
  if(!izin('uyeSil'))return;
  const m=members.find(m=>m._id===id||m.id===id);if(!m)return;
  confirm2('Üyeyi sil',`<strong>${m.rumuz}</strong> kalıcı olarak silinecek.`,async ()=>{
    members=members.filter(m=>m._id!==id&&m.id!==id);
    addLog('Üye silindi',m.rumuz);save();
    renderMembers();renderDashboard();
    await cmsYaz('MEMBER_DELETE', m._id||m.id);
  });
}

function openModal(type,data){
  if(!SESSION.girisZamani)return;
  const mc=document.getElementById('modalContainer');
  const idVal=data||null;
  const mData=idVal?members.find(m=>m._id===idVal||m.id===idVal||String(m._id)===String(idVal)||String(m.id)===String(idVal)):null;
  const today=todayStr();

  if(type==='addMember'&&izin('uyeEkle')){
    mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box"><h3>Yeni Üye</h3>
        <div class="form-row">
          <div class="form-group"><label>Rumuz</label><input id="m_rumuz" placeholder="Rumuz"></div>
          <div class="form-group"><label>Rütbe</label><select id="m_rutbe">${RUTBELER.map(r=>`<option>${r}</option>`).join('')}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Durum</label><select id="m_durum">${DURUMLAR.map(d=>`<option>${d}</option>`).join('')}</select></div>
          <div class="form-group"><label>Görev</label><select id="m_gorev">${GOREVLER.map(g=>`<option>${g}</option>`).join('')}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Katılım tarihi</label><input type="date" id="m_katilim" value="${today}"></div>
          <div class="form-group"><label>Doğum tarihi</label><input type="date" id="m_dogum"></div>
        </div>
        <div class="form-group" style="margin-bottom:8px"><label>Referans</label><input id="m_ref" placeholder="Kim getirdi?"></div>
        <div class="form-group" style="margin-bottom:8px"><label>Not</label><textarea id="m_not" placeholder="Lider notu..."></textarea></div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">İptal</button>
          <button class="btn btn-warn" onclick="reqSaveMember()"><i class="ti ti-check"></i> Onayla & Kaydet</button>
        </div>
      </div></div>`;
  } else if(type==='addEvent'&&izin('etkinlikEkle')){
    const opts=members.map(m=>`<option value="${m.rumuz}">${m.rumuz}</option>`).join('');
    mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box"><h3>Yeni Etkinlik</h3>
        <div class="form-row">
          <div class="form-group"><label>Etkinlik Türü</label><select id="e_tur">${ETK_TURLERI.map(t=>`<option>${t}</option>`).join('')}</select></div>
          <div class="form-group"><label>Tarih</label><input type="date" id="e_date" value="${today}"></div>
        </div>
        <div class="form-group" style="margin-bottom:8px"><label>Verilecek puan</label><input type="number" id="e_puan" value="10"></div>
        <div class="form-group" style="margin-bottom:8px"><label>Katılımcılar</label>
          <select id="e_katilimcilar" multiple style="height:110px">${opts}</select>
          <div style="font-size:10px;color:#555;margin-top:2px">Ctrl/Cmd ile çoklu seçim</div>
        </div>
        <div class="form-group" style="margin-bottom:8px"><label>Not</label><textarea id="e_not" placeholder="Notlar..."></textarea></div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">İptal</button>
          <button class="btn btn-warn" onclick="reqSaveEvent()"><i class="ti ti-check"></i> Onayla & Kaydet</button>
        </div>
      </div></div>`;
  } else if(type==='editMember'&&mData&&(izin('uyeDuzenle')||izin('rutbeDegistir'))){
    mc.innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box"><h3>${mData.rumuz} — Düzenle</h3>
        <div class="form-row">
          <div class="form-group"><label>Rütbe</label><select id="e_rutbe" ${!izin('rutbeDegistir')?'disabled':''}>${RUTBELER.map(r=>`<option${r===mData.rutbe?' selected':''}>${r}</option>`).join('')}</select></div>
          <div class="form-group"><label>Durum</label><select id="e_durum">${DURUMLAR.map(d=>`<option${d===mData.durum?' selected':''}>${d}</option>`).join('')}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Görev</label><select id="e_gorev" ${!izin('gorevAta')?'disabled':''}>${GOREVLER.map(g=>`<option${g===mData.gorev?' selected':''}>${g}</option>`).join('')}</select></div>
          <div class="form-group"><label>Puan</label><input type="number" id="e_puan" value="${mData.puan}" ${!izin('puanDuzenle')?'disabled':''}></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Katılım tarihi</label><input type="date" id="e_katilim" value="${mData.katilim||today}"></div>
          <div class="form-group"><label>Doğum tarihi</label><input type="date" id="e_dogum" value="${mData.dogum||''}"></div>
        </div>
        <div class="form-group" style="margin-bottom:8px"><label>Referans</label><input id="e_ref" value="${mData.ref||''}" placeholder="Kim getirdi?"></div>
        <div class="form-group" style="margin-bottom:8px"><label>Lider notu</label><textarea id="e_not">${mData.not||''}</textarea></div>
        <div class="modal-footer">
          <button class="btn" onclick="closeModal()">İptal</button>
          <button class="btn btn-warn" onclick="reqUpdateMember(${mData.id})"><i class="ti ti-check"></i> Onayla & Güncelle</button>
        </div>
      </div></div>`;
  }
}

function closeModal(){document.getElementById('modalContainer').innerHTML=''}

function reqSaveMember(){
  if(!izin('uyeEkle'))return;
  const rumuz=document.getElementById('m_rumuz').value.trim();if(!rumuz)return;
  const rutbe=document.getElementById('m_rutbe').value,durum=document.getElementById('m_durum').value,gorev=document.getElementById('m_gorev').value;
  confirm2('Yeni üye ekle',`<strong>${rumuz}</strong> — ${rutbe} rütbesiyle ekleniyor.`,async ()=>{
    const yeniUye={rumuz,rutbe,durum,gorev,puan:0,katilim:document.getElementById('m_katilim').value,dogum:document.getElementById('m_dogum').value,ref:document.getElementById('m_ref').value,not:document.getElementById('m_not').value,wixMemberId:''};
    addLog('Üye eklendi',`${rumuz} — ${rutbe}`);save();
    closeModal();
    await cmsYaz('MEMBER_ADD', yeniUye);
    renderMembers();renderDashboard();
  });
}

function reqUpdateMember(id){
  const m=members.find(m=>m._id===id||m.id===id);if(!m)return;
  const newRutbe=izin('rutbeDegistir')?document.getElementById('e_rutbe').value:m.rutbe;
  const newDurum=document.getElementById('e_durum').value;
  const newGorev=izin('gorevAta')?document.getElementById('e_gorev').value:m.gorev;
  const newPuan=izin('puanDuzenle')?Number(document.getElementById('e_puan').value)||0:m.puan;
  const oldPuan=Number(m.puan)||0;
  const changes=[];
  if(m.rutbe!==newRutbe)changes.push(`Rütbe: ${m.rutbe} → ${newRutbe}`);
  if(m.durum!==newDurum)changes.push(`Durum: ${m.durum} → ${newDurum}`);
  if(m.gorev!==newGorev)changes.push(`Görev: ${m.gorev} → ${newGorev}`);
  if(oldPuan!==newPuan)changes.push(`Puan: ${oldPuan} → ${newPuan}`);
  confirm2('Üye güncelle',`<strong>${m.rumuz}</strong><br>${changes.length?changes.join('<br>'):'<span style="color:#888;font-size:12px">Değişiklik yok</span>'}`,async ()=>{
    const guncellenmis={...m,rutbe:newRutbe,durum:newDurum,gorev:newGorev,puan:newPuan,
      katilim:document.getElementById('e_katilim').value,
      dogum:document.getElementById('e_dogum').value,
      ref:document.getElementById('e_ref').value,
      not:document.getElementById('e_not').value,
      _id: m._id || m.id
    };
    // Local array'i güncelle
    const idx=members.findIndex(x=>x._id===id||x.id===id);
    if(idx>-1) members[idx]={...members[idx],...guncellenmis};
    if(changes.length)addLog('Üye güncellendi',`${m.rumuz}: ${changes.join(' | ')}`);
    else addLog('Üye düzenlendi',`${m.rumuz} — veri kaydedildi`);
    save();closeModal();
    await cmsYaz('MEMBER_UPDATE', guncellenmis);
    renderMembers();renderDashboard();
  });
}

function reqSaveEvent(){
  if(!izin('etkinlikEkle'))return;
  const tur=document.getElementById('e_tur').value,date=document.getElementById('e_date').value,puan=parseInt(document.getElementById('e_puan').value)||0;
  const sel=document.getElementById('e_katilimcilar'),katilimcilar=Array.from(sel.selectedOptions).map(o=>o.value),not=document.getElementById('e_not').value;
  if(!tur)return;
  confirm2('Etkinlik ekle',`<strong>${tur}</strong> — ${fmtDate(date)}<br>${katilimcilar.length} katılımcı, +${puan} puan`,async ()=>{
    const yeniEtkinlik={tur,tarih:date,puan,katilimcilar:katilimcilar.join(','),not};
    // Puan güncelle
    katilimcilar.forEach(r=>{
      const m=members.find(m=>m.rumuz===r);
      if(m){
        m.puan=(m.puan||0)+puan;
        cmsYaz('MEMBER_UPDATE',{...m,_id:m._id||m.id});
      }
    });
    addLog('Etkinlik eklendi',`${tur} — ${fmtDate(date)}, ${katilimcilar.length} katılımcı, +${puan} puan`);
    save();closeModal();
    await cmsYaz('EVENT_ADD', yeniEtkinlik);
    renderEvents();renderDashboard();
  });
}
</script>
</body>
</html>
